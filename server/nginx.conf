worker_processes auto;
rtmp_auto_push on;
events {}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # HLS Settings
            hls on;
            hls_path /tmp/hls;
            hls_nested on;            # Creates /tmp/hls/stream_name/
            hls_cleanup on;           # Deletes files on disconnect
            hls_fragment 4s;          # Audio segment length
            hls_playlist_length 20s;  # Keeps last 5 segments

            # Delete folder when publishing is done
            exec_publish_done /bin/sh -c 'rm -rf /tmp/hls/$name';
        }
    }
}

http {
    server {
        include /etc/nginx/mime.types;
        listen 8080;

        # Serves the web interface
        location / {
            root /var/www/html;
            index index.html;
        }

        # Serves HLS streams
        location /hls {
            root /tmp;
            
            # Enable Directory Listing
            autoindex on;
            autoindex_format json;
            autoindex_localtime on;

            # HLS Mime Types
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }

            add_header Cache-Control no-cache;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
    }
}
